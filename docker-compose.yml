version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: solera_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - ./backend/.env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      - django

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
    depends_on:
      - django

  mcp-connector:
    build:
      context: ./mcp-connector
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - mcp_creds:/root/.mcp-connector
    environment:
      PORT: 4000

volumes:
  postgres_data:
  media_data:
  mcp_creds:
