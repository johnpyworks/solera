version: "3.9"

# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  postgres:
    ports: []  # Not exposed to host in production — internal network only
    environment:
      POSTGRES_DB: solera_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  django:
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - media_data:/app/media       # Media only — no source code bind mount
      - static_data:/app/staticfiles
    env_file:
      - ./backend/.env.production
    restart: unless-stopped

  celery-worker:
    volumes:
      - media_data:/app/media
    env_file:
      - ./backend/.env.production
    restart: unless-stopped

  celery-beat:
    env_file:
      - ./backend/.env.production
    restart: unless-stopped

  mcp-connector:
    ports: []  # Not exposed to host — accessed via nginx /mcp/ location block
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/solera.conf:/etc/nginx/conf.d/default.conf:ro
      - ./vlad-portal/dist:/usr/share/nginx/html:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - django
    restart: unless-stopped

volumes:
  static_data:
