# Solera Portal — nginx configuration
# Replace portal.solerafinancial.com with your actual domain.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name portal.solerafinancial.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.solerafinancial.com;

    # SSL — certbot managed
    ssl_certificate     /etc/letsencrypt/live/portal.solerafinancial.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.solerafinancial.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── Django API ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # ── Django Admin ─────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Static Files ───────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Uploaded Client Files (media) ─────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        # Restrict direct access — only authenticated users should reach this
        # via Django's serve logic. Consider adding auth_request here.
    }

    # ── MCP Connector Dashboard (internal — restrict by IP in production) ──
    location /mcp/ {
        proxy_pass         http://mcp-connector:4000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        # Restrict to advisor IPs only
        # allow 1.2.3.4;
        # deny all;
    }

    # ── React Frontend (catch-all — must be last) ─────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA fallback for react-router
        expires -1;  # Never cache index.html
        add_header Cache-Control "no-store";
    }
}
